relevancy:
  fuzzy_threshold: 88
  use_keywords_column: true
  brand_suffix_patterns:
    - "\\[[^\\]]+\\]"
    - "\\([^)]*MSM[^)]*\\)"
    - "\\s+-\\s+V\\d+\\s*$"

sentiment:
